services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restro
      POSTGRES_USER: restro
      POSTGRES_PASSWORD: restro
    ports:
      - "5432:5432"
    volumes:
      - restro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restro"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: restro
      DB_USERNAME: restro
      DB_PASSWORD: restro
      JWT_SECRET: change-this-to-a-long-random-secret-in-production-min-32-bytes
    ports:
      - "8080:8080"

volumes:
  restro-postgres-data:
