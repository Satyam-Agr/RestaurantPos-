spring:
  application:
    name: restro-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:projectDB}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rundev}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-production-min-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
    customer-expiration-ms: ${CUSTOMER_JWT_EXPIRATION_MS:2592000000}
  billing:
    # Controls WHEN a table becomes bookable again and the session officially ends, relative to billing.
    #   true  = happens as soon as the cashier GENERATES the bill (before payment is collected)
    #   false = happens only once the cashier marks the bill PAID
    # Flip this line to switch behavior; no code changes needed.
    free-table-on-generate: ${FREE_TABLE_ON_GENERATE:true}
