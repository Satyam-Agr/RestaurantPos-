spring:
  application:
    name: restro-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:projectDB}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rundev}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-production-min-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
    customer-expiration-ms: ${CUSTOMER_JWT_EXPIRATION_MS:2592000000}
